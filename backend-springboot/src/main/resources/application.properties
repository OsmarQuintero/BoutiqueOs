spring.application.name=boutique-os-backend
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/boutique-os}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
app.seed-demo-data=${APP_SEED_DEMO_DATA:false}
app.stripe.secret-key=${STRIPE_SECRET_KEY:}
app.stripe.price-id=${STRIPE_PRICE_ID:}
app.stripe.checkout.mode=${STRIPE_CHECKOUT_MODE:subscription}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:4200}
app.mail.from=${APP_MAIL_FROM:}
app.password-reset.ttl-minutes=${APP_PASSWORD_RESET_TTL_MINUTES:20}
