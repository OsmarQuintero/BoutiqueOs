services:
  - type: web
    name: boutique-os-backend
    runtime: java
    rootDir: backend-springboot
    plan: free
    buildCommand: ./mvnw clean package
    startCommand: java -Dserver.port=$PORT -jar target/boutique-os-backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/products
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_H2_CONSOLE_ENABLED
        value: "false"
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
